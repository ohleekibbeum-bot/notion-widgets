<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Widgets</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <span class="header-emoji">🧩</span>
    <h1>Notion Widgets</h1>
    <p>노션 페이지에 임베드할 수 있는 위젯 모음입니다.<br>설정을 조정하고 URL을 복사해서 노션에 붙여넣으세요.</p>
  </header>

  <div class="callout">
    <div class="callout-box">
      <span class="callout-icon">💡</span>
      <div>
        <strong>사용 방법</strong>
        <ol>
          <li>아래에서 원하는 위젯의 <strong>⚙ 설정</strong>을 눌러 옵션을 조정하세요</li>
          <li><strong>URL 복사</strong> 버튼을 클릭하세요</li>
          <li>노션에서 <code>/embed</code> 블록을 추가하고 URL을 붙여넣으세요</li>
        </ol>
      </div>
    </div>
  </div>

  <div class="divider"><hr></div>
  <h2 class="section-title">위젯 목록</h2>

  <div class="widget-grid" id="widget-grid"></div>

  <div class="toast" id="toast"></div>

  <!-- GIF 갤러리 모달 -->
  <div class="modal-overlay" id="gallery-modal" onclick="if(event.target===this)closeGallery()">
    <div class="modal">
      <div class="modal-header">
        <h3>🎨 GIF 갤러리</h3>
        <button class="modal-close" onclick="closeGallery()">&times;</button>
      </div>
      <div class="modal-chips" id="gallery-categories"></div>
      <div class="modal-results" id="gallery-grid"></div>
      <div class="modal-footer">
        <span class="giphy-credit">더 많은 GIF가 필요하면 → </span>
        <a href="https://giphy.com" target="_blank" class="giphy-link">GIPHY에서 검색</a>
        <span class="giphy-credit"> (URL 복사 후 붙여넣기)</span>
      </div>
    </div>
  </div>

  <footer class="footer">
    Notion Widgets &middot; 무료 오픈소스 위젯 모음
  </footer>

  <script src="js/main.js"></script>
</body>
</html>

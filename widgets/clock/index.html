<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; font-family: 'Inter', sans-serif;
  }
  body.dark { background: #1a1a1a; color: #e8e8e8; }
  body.light { background: #fff; color: #1a1a1a; }

  /* Digital */
  .digital-time {
    font-size: 3.5rem;
    font-weight: 600;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .digital-date {
    font-size: 0.95rem;
    opacity: 0.5;
    margin-top: 4px;
    font-weight: 300;
  }

  /* Analog */
  .analog { position: relative; width: 140px; height: 140px; }
  .analog-face {
    width: 100%; height: 100%; border-radius: 50%;
    border: 2px solid currentColor; position: relative;
  }
  .hand {
    position: absolute; bottom: 50%; left: 50%;
    transform-origin: bottom center;
    border-radius: 2px;
  }
  .dark .hand { background: #e8e8e8; }
  .light .hand { background: #1a1a1a; }
  .hand-hour { width: 3px; height: 30%; margin-left: -1.5px; }
  .hand-minute { width: 2px; height: 40%; margin-left: -1px; }
  .hand-second { width: 1px; height: 44%; margin-left: -0.5px; background: #e74c3c !important; }
  .center-dot {
    position: absolute; top: 50%; left: 50%;
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; transform: translate(-50%, -50%);
  }
  .tick {
    position: absolute; top: 4px; left: 50%;
    width: 1px; height: 8px; margin-left: -0.5px;
    background: currentColor; opacity: 0.4;
    transform-origin: center 66px;
  }
  .tick.major { height: 12px; width: 2px; margin-left: -1px; opacity: 0.8; transform-origin: center 66px; }
  .analog-date {
    font-size: 0.8rem; opacity: 0.5; margin-top: 10px; font-weight: 300;
  }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const type = params.get('type') || 'digital';
  const tz = params.get('timezone') || 'Asia/Seoul';
  const theme = params.get('theme') || 'dark';
  const showDate = params.get('showDate') !== 'false';

  document.body.classList.add(theme);

  function getTime() {
    const now = new Date();
    const opts = { timeZone: tz };
    const h = parseInt(now.toLocaleString('en', { ...opts, hour: 'numeric', hour12: false }));
    const m = parseInt(now.toLocaleString('en', { ...opts, minute: 'numeric' }));
    const s = parseInt(now.toLocaleString('en', { ...opts, second: 'numeric' }));
    const dateStr = now.toLocaleDateString('ko-KR', { ...opts, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    return { h, m, s, dateStr };
  }

  if (type === 'analog') {
    const container = document.createElement('div');
    container.className = 'analog';
    const face = document.createElement('div');
    face.className = 'analog-face';
    for (let i = 0; i < 12; i++) {
      const tick = document.createElement('div');
      tick.className = 'tick major';
      tick.style.transform = `rotate(${i * 30}deg)`;
      face.appendChild(tick);
    }
    const hHand = document.createElement('div'); hHand.className = 'hand hand-hour';
    const mHand = document.createElement('div'); mHand.className = 'hand hand-minute';
    const sHand = document.createElement('div'); sHand.className = 'hand hand-second';
    const dot = document.createElement('div'); dot.className = 'center-dot';
    face.append(hHand, mHand, sHand, dot);
    container.appendChild(face);
    document.body.appendChild(container);

    const dateEl = document.createElement('div');
    dateEl.className = 'analog-date';
    if (showDate) document.body.appendChild(dateEl);

    function updateAnalog() {
      const { h, m, s, dateStr } = getTime();
      hHand.style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
      mHand.style.transform = `rotate(${m * 6}deg)`;
      sHand.style.transform = `rotate(${s * 6}deg)`;
      if (showDate) dateEl.textContent = dateStr;
    }
    updateAnalog();
    setInterval(updateAnalog, 1000);
  } else {
    const timeEl = document.createElement('div');
    timeEl.className = 'digital-time';
    document.body.appendChild(timeEl);

    const dateEl = document.createElement('div');
    dateEl.className = 'digital-date';
    if (showDate) document.body.appendChild(dateEl);

    function updateDigital() {
      const { h, m, s, dateStr } = getTime();
      timeEl.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if (showDate) dateEl.textContent = dateStr;
    }
    updateDigital();
    setInterval(updateDigital, 1000);
  }
</script>
</body>
</html>

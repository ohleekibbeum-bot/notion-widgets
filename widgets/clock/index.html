<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; font-family: 'Inter', sans-serif;
  }
  body.light { background: #fff; color: #37352f; }
  body.dark { background: #191919; color: #e8e8e3; }
  body.notion { background: #f7f6f3; color: #37352f; }

  /* Digital */
  .digital-time {
    font-size: 3.2rem; font-weight: 700;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  body.notion .digital-time { color: #37352f; }
  body.dark .digital-time { color: #ffffffcf; }

  .digital-seconds {
    font-size: 1.4rem; font-weight: 300;
    opacity: 0.4; vertical-align: super; margin-left: 2px;
  }
  .digital-date {
    font-size: 0.82rem; color: #787774; margin-top: 4px; font-weight: 400;
  }
  body.dark .digital-date { color: #ffffff5e; }

  /* Analog */
  .analog { position: relative; width: 130px; height: 130px; }
  .analog-face {
    width: 100%; height: 100%; border-radius: 50%;
    position: relative;
  }
  body.light .analog-face,
  body.notion .analog-face { border: 1.5px solid #e3e3e0; background: #fff; }
  body.dark .analog-face { border: 1.5px solid #333; background: #222; }

  .hand {
    position: absolute; bottom: 50%; left: 50%;
    transform-origin: bottom center; border-radius: 1px;
  }
  body.light .hand, body.notion .hand { background: #37352f; }
  body.dark .hand { background: #e8e8e3; }
  .hand-hour { width: 2.5px; height: 28%; margin-left: -1.25px; }
  .hand-minute { width: 1.5px; height: 38%; margin-left: -0.75px; }
  .hand-second { width: 1px; height: 42%; margin-left: -0.5px; }
  body.light .hand-second, body.notion .hand-second { background: #d44c47; }
  body.dark .hand-second { background: #d44c47; }

  .center-dot {
    position: absolute; top: 50%; left: 50%;
    width: 5px; height: 5px; border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  body.light .center-dot, body.notion .center-dot { background: #37352f; }
  body.dark .center-dot { background: #e8e8e3; }

  .tick {
    position: absolute; top: 6px; left: 50%;
    width: 1px; height: 6px; margin-left: -0.5px;
    transform-origin: center 59px;
  }
  body.light .tick, body.notion .tick { background: #d4d4d0; }
  body.dark .tick { background: #444; }

  .tick.major { height: 10px; width: 1.5px; margin-left: -0.75px; }
  body.light .tick.major, body.notion .tick.major { background: #b4b4b0; }
  body.dark .tick.major { background: #666; }

  .analog-date {
    font-size: 0.75rem; color: #787774; margin-top: 10px; font-weight: 400;
  }
  body.dark .analog-date { color: #ffffff5e; }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const type = params.get('type') || 'digital';
  const tz = params.get('timezone') || 'Asia/Seoul';
  const theme = params.get('theme') || 'notion';
  const showDate = params.get('showDate') !== 'false';

  document.body.classList.add(theme);

  function getTime() {
    const now = new Date();
    const opts = { timeZone: tz };
    const h = parseInt(now.toLocaleString('en', { ...opts, hour: 'numeric', hour12: false }));
    const m = parseInt(now.toLocaleString('en', { ...opts, minute: 'numeric' }));
    const s = parseInt(now.toLocaleString('en', { ...opts, second: 'numeric' }));
    const dateStr = now.toLocaleDateString('ko-KR', { ...opts, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    return { h, m, s, dateStr };
  }

  if (type === 'analog') {
    const container = document.createElement('div');
    container.className = 'analog';
    const face = document.createElement('div');
    face.className = 'analog-face';

    for (let i = 0; i < 60; i++) {
      const tick = document.createElement('div');
      tick.className = i % 5 === 0 ? 'tick major' : 'tick';
      tick.style.transform = `rotate(${i * 6}deg)`;
      face.appendChild(tick);
    }

    const hHand = document.createElement('div'); hHand.className = 'hand hand-hour';
    const mHand = document.createElement('div'); mHand.className = 'hand hand-minute';
    const sHand = document.createElement('div'); sHand.className = 'hand hand-second';
    const dot = document.createElement('div'); dot.className = 'center-dot';
    face.append(hHand, mHand, sHand, dot);
    container.appendChild(face);
    document.body.appendChild(container);

    const dateEl = document.createElement('div');
    dateEl.className = 'analog-date';
    if (showDate) document.body.appendChild(dateEl);

    function updateAnalog() {
      const { h, m, s, dateStr } = getTime();
      hHand.style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
      mHand.style.transform = `rotate(${m * 6}deg)`;
      sHand.style.transform = `rotate(${s * 6}deg)`;
      if (showDate) dateEl.textContent = dateStr;
    }
    updateAnalog();
    setInterval(updateAnalog, 1000);
  } else {
    const timeEl = document.createElement('div');
    timeEl.className = 'digital-time';
    document.body.appendChild(timeEl);

    const dateEl = document.createElement('div');
    dateEl.className = 'digital-date';
    if (showDate) document.body.appendChild(dateEl);

    function updateDigital() {
      const { h, m, s, dateStr } = getTime();
      timeEl.innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}<span class="digital-seconds">${String(s).padStart(2,'0')}</span>`;
      if (showDate) dateEl.textContent = dateStr;
    }
    updateDigital();
    setInterval(updateDigital, 1000);
  }
</script>
</body>
</html>

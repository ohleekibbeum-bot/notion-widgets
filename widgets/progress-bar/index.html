<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Bar Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif; padding: 20px;
  }
  body.light { background: #fff; color: #37352f; }
  body.dark { background: #191919; color: #e8e8e3; }
  body.notion { background: #f7f6f3; color: #37352f; }

  .container { width: 100%; max-width: 460px; }

  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .label { font-size: 0.85rem; font-weight: 500; }
  .percent {
    font-size: 0.85rem; font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .track {
    width: 100%; height: 8px; border-radius: 4px; overflow: hidden;
  }
  body.light .track, body.notion .track { background: #e3e3e0; }
  body.dark .track { background: #333; }

  .fill {
    height: 100%; border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .detail {
    margin-top: 6px; font-size: 0.75rem; color: #787774;
  }
  body.dark .detail { color: #ffffff5e; }

  .empty {
    text-align: center; padding: 24px; color: #787774;
  }
  .empty-icon { font-size: 2.4rem; margin-bottom: 8px; display: block; opacity: 0.6; }
  .empty-text { font-size: 0.85rem; }
  .empty-hint {
    display: inline-block; margin-top: 6px; font-size: 0.75rem;
    background: rgba(135,131,120,0.12); color: #9b9a97;
    padding: 2px 7px; border-radius: 3px;
    font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
  }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const value = parseFloat(params.get('value'));
  const max = parseFloat(params.get('max')) || 100;
  const label = params.get('label') || '';
  const color = params.get('color') || '#2eaadc';
  const theme = params.get('theme') || 'notion';

  document.body.classList.add(theme);

  if (isNaN(value)) {
    document.body.innerHTML = `<div class="empty"><span class="empty-icon">📊</span><div class="empty-text">값을 설정해주세요</div><span class="empty-hint">?value=75&max=100</span></div>`;
  } else {
    const pct = Math.min(Math.round((value / max) * 100), 100);

    const container = document.createElement('div');
    container.className = 'container';
    container.innerHTML = `
      <div class="header">
        <div class="label">${label}</div>
        <div class="percent" style="color:${color}">${pct}%</div>
      </div>
      <div class="track">
        <div class="fill" style="background:${color}; width: 0%"></div>
      </div>
      <div class="detail">${value} / ${max}</div>
    `;
    document.body.appendChild(container);

    requestAnimationFrame(() => {
      setTimeout(() => {
        container.querySelector('.fill').style.width = pct + '%';
      }, 100);
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Bar Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif; padding: 16px;
  }
  .container { width: 100%; max-width: 500px; }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .label { font-size: 0.9rem; font-weight: 600; color: #e8e8e8; }
  .percent { font-size: 1.4rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .track {
    width: 100%; height: 18px; background: #2a2a2a;
    border-radius: 10px; overflow: hidden; position: relative;
  }
  .fill {
    height: 100%; border-radius: 10px;
    transition: width 1s ease;
    background: linear-gradient(90deg, var(--c), var(--c-light));
    position: relative;
  }
  .fill::after {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .placeholder {
    color: #888; font-size: 14px; text-align: center; padding: 20px;
  }
  .placeholder span { font-size: 2rem; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const value = parseFloat(params.get('value'));
  const max = parseFloat(params.get('max')) || 100;
  const label = params.get('label') || '';
  const color = params.get('color') || '#6c5ce7';

  if (isNaN(value)) {
    document.body.innerHTML = '<div class="placeholder"><span>📊</span>값을 설정해주세요<br><small style="color:#555">?value=75&max=100</small></div>';
  } else {
    const pct = Math.min(Math.round((value / max) * 100), 100);
    const hsl = hexToHSL(color);
    const lighter = `hsl(${hsl.h}, ${hsl.s}%, ${Math.min(hsl.l + 15, 90)}%)`;

    const container = document.createElement('div');
    container.className = 'container';
    container.innerHTML = `
      <div class="header">
        <div class="label">${label}</div>
        <div class="percent" style="color:${color}">${pct}%</div>
      </div>
      <div class="track">
        <div class="fill" style="--c:${color}; --c-light:${lighter}; width: 0%"></div>
      </div>
    `;
    document.body.appendChild(container);

    requestAnimationFrame(() => {
      setTimeout(() => {
        container.querySelector('.fill').style.width = pct + '%';
      }, 100);
    });
  }

  function hexToHSL(hex) {
    hex = hex.replace('#', '');
    const r = parseInt(hex.substring(0, 2), 16) / 255;
    const g = parseInt(hex.substring(2, 4), 16) / 255;
    const b = parseInt(hex.substring(4, 6), 16) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
        case g: h = ((b - r) / d + 2) / 6; break;
        case b: h = ((r - g) / d + 4) / 6; break;
      }
    }
    return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif; padding: 16px;
  }
  body.dark { background: #1a1a1a; color: #e8e8e8; }
  body.light { background: #fff; color: #1a1a1a; }

  .weather {
    display: flex; align-items: center; gap: 20px;
  }
  .weather-icon { font-size: 3.2rem; line-height: 1; }
  .weather-temp {
    font-size: 2.8rem; font-weight: 700; line-height: 1;
  }
  .weather-desc {
    font-size: 0.85rem; opacity: 0.6; margin-top: 2px;
  }
  .weather-details {
    display: flex; gap: 16px; margin-top: 8px; font-size: 0.78rem; opacity: 0.5;
  }
  .loading {
    color: #888; font-size: 14px;
  }
  .placeholder {
    color: #888; font-size: 14px; text-align: center; padding: 20px;
  }
  .placeholder span { font-size: 2rem; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const lat = params.get('lat') || '37.5665';
  const lon = params.get('lon') || '126.978';
  const theme = params.get('theme') || 'dark';
  const unit = params.get('unit') || 'celsius';

  document.body.classList.add(theme);

  const WMO_CODES = {
    0: { icon: '☀️', desc: '맑음' },
    1: { icon: '🌤️', desc: '대체로 맑음' },
    2: { icon: '⛅', desc: '부분적 흐림' },
    3: { icon: '☁️', desc: '흐림' },
    45: { icon: '🌫️', desc: '안개' },
    48: { icon: '🌫️', desc: '서리 안개' },
    51: { icon: '🌦️', desc: '약한 이슬비' },
    53: { icon: '🌦️', desc: '이슬비' },
    55: { icon: '🌧️', desc: '강한 이슬비' },
    61: { icon: '🌧️', desc: '약한 비' },
    63: { icon: '🌧️', desc: '비' },
    65: { icon: '🌧️', desc: '강한 비' },
    71: { icon: '🌨️', desc: '약한 눈' },
    73: { icon: '🌨️', desc: '눈' },
    75: { icon: '❄️', desc: '강한 눈' },
    77: { icon: '🌨️', desc: '싸락눈' },
    80: { icon: '🌦️', desc: '약한 소나기' },
    81: { icon: '🌧️', desc: '소나기' },
    82: { icon: '⛈️', desc: '강한 소나기' },
    85: { icon: '🌨️', desc: '약한 눈 소나기' },
    86: { icon: '❄️', desc: '강한 눈 소나기' },
    95: { icon: '⛈️', desc: '뇌우' },
    96: { icon: '⛈️', desc: '우박 뇌우' },
    99: { icon: '⛈️', desc: '강한 우박 뇌우' }
  };

  document.body.innerHTML = '<div class="loading">날씨 정보를 불러오는 중...</div>';

  const tempUnit = unit === 'fahrenheit' ? 'fahrenheit' : 'celsius';
  const apiURL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&temperature_unit=${tempUnit}`;

  fetch(apiURL)
    .then(r => r.json())
    .then(data => {
      const c = data.current;
      const code = c.weather_code;
      const info = WMO_CODES[code] || { icon: '🌡️', desc: '알 수 없음' };
      const unitSymbol = unit === 'fahrenheit' ? '°F' : '°C';

      document.body.innerHTML = `
        <div class="weather">
          <div class="weather-icon">${info.icon}</div>
          <div>
            <div class="weather-temp">${Math.round(c.temperature_2m)}${unitSymbol}</div>
            <div class="weather-desc">${info.desc}</div>
            <div class="weather-details">
              <span>💧 ${c.relative_humidity_2m}%</span>
              <span>💨 ${c.wind_speed_10m} km/h</span>
            </div>
          </div>
        </div>
      `;
    })
    .catch(() => {
      document.body.innerHTML = '<div class="placeholder"><span>⚠️</span>날씨 정보를 불러올 수 없습니다</div>';
    });
</script>
</body>
</html>

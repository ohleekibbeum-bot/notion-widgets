<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; font-family: 'Inter', sans-serif;
  }
  body.light { background: #fff; color: #37352f; }
  body.dark { background: #191919; color: #e8e8e3; }
  body.notion { background: #f7f6f3; color: #37352f; }

  .title {
    font-size: 0.85rem; font-weight: 500; color: #787774;
    margin-bottom: 14px; text-align: center;
  }
  body.dark .title { color: #ffffff5e; }

  .countdown { display: flex; gap: 12px; align-items: center; }

  .unit {
    text-align: center;
    background: var(--card-bg);
    padding: 10px 14px;
    border-radius: 6px;
    min-width: 60px;
  }
  body.light .unit, body.notion .unit { background: #fff; border: 1px solid #e3e3e0; }
  body.dark .unit { background: #222; border: 1px solid #333; }

  .unit-value {
    font-size: 2rem; font-weight: 700;
    font-variant-numeric: tabular-nums; line-height: 1.1;
  }
  .unit-label {
    font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.5px; color: #787774; margin-top: 3px; font-weight: 500;
  }
  body.dark .unit-label { color: #ffffff5e; }

  .separator {
    font-size: 1.4rem; color: #b4b4b0; font-weight: 300;
  }
  body.dark .separator { color: #555; }

  .expired {
    font-size: 1.2rem; font-weight: 600; text-align: center;
  }

  .empty {
    text-align: center; padding: 24px; color: #787774;
  }
  .empty-icon { font-size: 2.4rem; margin-bottom: 8px; display: block; opacity: 0.6; }
  .empty-text { font-size: 0.85rem; }
  .empty-hint {
    display: inline-block; margin-top: 6px; font-size: 0.75rem;
    background: rgba(135,131,120,0.12); color: #9b9a97;
    padding: 2px 7px; border-radius: 3px;
    font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
  }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const target = params.get('target');
  const title = params.get('title') || '';
  const theme = params.get('theme') || 'notion';
  const color = params.get('color') || '#2eaadc';

  document.body.classList.add(theme);

  if (!target) {
    document.body.innerHTML = `<div class="empty"><span class="empty-icon">⏳</span><div class="empty-text">목표 날짜를 설정해주세요</div><span class="empty-hint">?target=2026-12-31</span></div>`;
  } else {
    const targetDate = new Date(target + 'T00:00:00');

    if (title) {
      const titleEl = document.createElement('div');
      titleEl.className = 'title';
      titleEl.textContent = title;
      document.body.appendChild(titleEl);
    }

    const container = document.createElement('div');
    container.className = 'countdown';
    document.body.appendChild(container);

    function update() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        container.innerHTML = `<div class="expired" style="color:${color}">🎉 목표 날짜에 도달했습니다!</div>`;
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      container.innerHTML = [
        { v: d, l: '일' },
        { v: h, l: '시간' },
        { v: m, l: '분' },
        { v: s, l: '초' }
      ].map((u, i) => `
        ${i > 0 ? '<span class="separator">:</span>' : ''}
        <div class="unit">
          <div class="unit-value" style="color:${i === 0 ? color : 'inherit'}">${String(u.v).padStart(2, '0')}</div>
          <div class="unit-label">${u.l}</div>
        </div>
      `).join('');
    }

    update();
    setInterval(update, 1000);
  }
</script>
</body>
</html>

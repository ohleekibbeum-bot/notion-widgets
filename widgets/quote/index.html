<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+KR:wght@400;700&family=Gaegu&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  body.dark { background: #1a1a1a; color: #e8e8e8; }
  body.light { background: #fff; color: #1a1a1a; }
  body.minimal { background: transparent; color: #e8e8e8; }

  .font-sans { font-family: 'Inter', sans-serif; }
  .font-serif { font-family: 'Noto Serif KR', serif; }
  .font-handwriting { font-family: 'Gaegu', cursive; }

  .quote-mark {
    font-size: 3rem; opacity: 0.15; line-height: 1; margin-bottom: 4px;
  }
  .quote-text {
    font-size: 1.3rem; font-weight: 400; line-height: 1.6;
    max-width: 500px;
  }
  .quote-author {
    margin-top: 12px; font-size: 0.85rem; opacity: 0.5;
  }
  .quote-author::before { content: '— '; }
</style>
</head>
<body>
<script>
  const quotes = [
    { text: '천 리 길도 한 걸음부터', author: '노자' },
    { text: '배움에는 왕도가 없다', author: '유클리드' },
    { text: '오늘 할 수 있는 일을 내일로 미루지 마라', author: '벤자민 프랭클린' },
    { text: '실패는 성공의 어머니', author: '속담' },
    { text: '작은 기회로부터 종종 위대한 업적이 시작된다', author: '데모스테네스' },
    { text: '꿈을 이루고자 하는 의지가 있는 자에게 불가능이란 없다', author: '알렉산더 대왕' },
    { text: '가장 큰 영광은 한 번도 실패하지 않음이 아니라 실패할 때마다 다시 일어서는 데에 있다', author: '공자' },
    { text: '현재를 즐겨라', author: '호라티우스' },
    { text: '시작이 반이다', author: '아리스토텔레스' },
    { text: '아는 것이 힘이다', author: '프랜시스 베이컨' }
  ];

  const params = new URLSearchParams(location.search);
  const text = params.get('text');
  const author = params.get('author');
  const theme = params.get('theme') || 'dark';
  const font = params.get('font') || 'sans';

  document.body.classList.add(theme);

  let q;
  if (text) {
    q = { text, author: author || '' };
  } else {
    q = quotes[Math.floor(Math.random() * quotes.length)];
  }

  const container = document.createElement('div');
  container.className = `font-${font}`;
  container.innerHTML = `
    <div class="quote-mark">"</div>
    <div class="quote-text">${q.text}</div>
    ${q.author ? `<div class="quote-author">${q.author}</div>` : ''}
  `;
  document.body.appendChild(container);
</script>
</body>
</html>

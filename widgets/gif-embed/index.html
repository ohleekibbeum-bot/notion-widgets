<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Embed Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  body { display: flex; align-items: center; justify-content: center; }
  img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
  .placeholder {
    color: #888;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
  .placeholder span { font-size: 2rem; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const url = params.get('url');
  const width = params.get('width') || '100%';
  const radius = params.get('radius') || '0';
  const bg = params.get('bg');

  if (bg) document.body.style.background = bg;

  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'GIF';
    img.style.width = width;
    img.style.borderRadius = radius + 'px';
    img.onerror = () => {
      document.body.innerHTML = '<div class="placeholder"><span>⚠️</span>이미지를 불러올 수 없습니다</div>';
    };
    document.body.appendChild(img);
  } else {
    document.body.innerHTML = '<div class="placeholder"><span>🎞️</span>GIF URL을 설정해주세요<br><small style="color:#555">?url=https://...</small></div>';
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Embed Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  body { display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
  img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .empty {
    text-align: center; padding: 24px; color: #787774;
  }
  .empty-icon {
    font-size: 2.4rem; margin-bottom: 8px; display: block; opacity: 0.6;
  }
  .empty-text { font-size: 0.85rem; line-height: 1.5; }
  .empty-hint {
    display: inline-block; margin-top: 6px; font-size: 0.75rem;
    background: rgba(135,131,120,0.12); color: #9b9a97;
    padding: 2px 7px; border-radius: 3px;
    font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
  }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const url = params.get('url');
  const width = params.get('width') || '100%';
  const radius = params.get('radius') || '0';
  const bg = params.get('bg');

  if (bg) document.body.style.background = bg;

  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'GIF';
    img.style.width = width;
    img.style.borderRadius = radius + 'px';
    img.onerror = () => {
      document.body.innerHTML = `<div class="empty"><span class="empty-icon">⚠️</span><div class="empty-text">이미지를 불러올 수 없습니다</div></div>`;
    };
    document.body.appendChild(img);
  } else {
    document.body.innerHTML = `<div class="empty">
      <span class="empty-icon">🎞️</span>
      <div class="empty-text">GIF URL을 설정해주세요</div>
      <span class="empty-hint">?url=https://...</span>
    </div>`;
  }
</script>
</body>
</html>
